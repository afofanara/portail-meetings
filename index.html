// Helpers
const prefLabel = (p) => {
  const d = PREF_DAYS.find(x => x.value === p.day);
  const pr = PREF_PERIODS.find(x => x.value === p.period);
  return `${d?.label || "?"} ${pr?.label?.split(" ")[0]?.toLowerCase() || ""}`;
};

const matchesPref = (meeting, dayKey, hour) => {
  return meeting.prefs?.some(p => {
    const d = PREF_DAYS.find(x => x.value === p.day);
    const pr = PREF_PERIODS.find(x => x.value === p.period);
    return d?.dayKey === dayKey && pr?.hours?.includes(hour);
  });
};

// ─── PARTNER: REQUEST FORM ───

function PartnerForm({ user }) {
  const [form, setForm] = useState({ partner: user.name || "", org: "", contact: "", email: user.email || "", phone: "", target: "DGF", topic: "", details: "" });
  const [prefs, setPrefs] = useState([{ day: "", period: "" }, { day: "", period: "" }, { day: "", period: "" }]);
  const [errors, setErrors] = useState({});
  const [done, setDone] = useState(false);
  const [sending, setSending] = useState(false);
  const s = (k, v) => { setForm(f => ({ ...f, [k]: v })); setErrors(e => ({ ...e, [k]: undefined })); };

  const validate = () => {
    const e = {};
    if (!form.partner.trim()) e.partner = "Champ requis";
    if (!form.contact.trim()) e.contact = "Champ requis";
    if (!form.email.trim()) e.email = "Champ requis";
    else if (!/\S+@\S+\.\S+/.test(form.email)) e.email = "E-mail invalide";
    if (!form.topic.trim()) e.topic = "Champ requis";
    if (!prefs[0].day || !prefs[0].period) e.pref1 = "Sélectionnez au moins une préférence";
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const handleSubmit = async () => {
    if (!validate()) return;
    setSending(true);
    const prefLabelsForWebhook = prefs.filter(p => p.day && p.period).map(p => prefLabel(p));
    try {
      await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          partner: form.partner,
          org: form.org,
          contact: form.contact,
          email: form.email,
          phone: form.phone,
          target: form.target,
          topic: form.topic,
          details: form.details,
          pref1: prefLabelsForWebhook[0] || "",
          pref2: prefLabelsForWebhook[1] || "",
          pref3: prefLabelsForWebhook[2] || "",
        }),
      });
    } catch (err) {
      console.log("Webhook fallback (CORS ou offline):", err);
    }
    setSending(false);
    setDone(true);
  };

  if (sending) return (
    <Card style={{ textAlign: "center", padding: 60 }}>
      <div style={{ fontSize: 36, marginBottom: 16, animation: "spin 1s linear infinite" }}>⏳</div>
      <style>{`@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }`}</style>
      <div style={{ fontSize: 18, fontWeight: 800, color: D, marginBottom: 8 }}>Envoi en cours...</div>
      <p style={{ fontSize: 13, color: M }}>Transmission de votre demande et envoi des notifications.</p>
    </Card>
  );

  const prefLabels = prefs.filter(p => p.day && p.period).map(p => prefLabel(p));

  if (done) return (
    <div>
      <Card style={{ textAlign: "center", padding: 40, marginBottom: 16 }}>
        <div style={{ fontSize: 48, marginBottom: 12 }}>✅</div>
        <div style={{ fontSize: 20, fontWeight: 800, color: D, marginBottom: 6 }}>Demande envoyée avec succès</div>
        <p style={{ fontSize: 13, color: M, maxWidth: 440, margin: "0 auto", lineHeight: 1.7 }}>Votre demande a été enregistrée. Deux notifications ont été envoyées :</p>
      </Card>

      <Card style={{ padding: 0, marginBottom: 12, overflow: "hidden" }}>
        <div style={{ padding: "12px 18px", background: LG, borderBottom: `1px solid #A7D5B8`, display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 14 }}>📧</span>
          <span style={{ fontSize: 12, fontWeight: 700, color: G }}>Accusé de réception — Partenaire</span>
          <span style={{ marginLeft: "auto", fontSize: 10, color: G, background: "#fff", padding: "2px 8px", borderRadius: 10, fontWeight: 600 }}>Envoyé</span>
        </div>
        <div style={{ padding: 18, fontSize: 12, color: D, lineHeight: 1.8 }}>
          <div style={{ display: "flex", gap: 8, marginBottom: 6 }}><span style={{ color: M, fontWeight: 600, width: 30 }}>À :</span><span>{form.email}</span></div>
          <div style={{ display: "flex", gap: 8, marginBottom: 12 }}><span style={{ color: M, fontWeight: 600, width: 30 }}>Obj :</span><span style={{ fontWeight: 600 }}>Confirmation de réception – Demande de rencontre bilatérale</span></div>
          <div style={{ padding: "14px 16px", background: BG, borderRadius: 8, borderLeft: `3px solid ${G}` }}>
            <p style={{ margin: "0 0 8px" }}>Madame, Monsieur,</p>
            <p style={{ margin: "0 0 8px" }}>Nous accusons bonne réception de votre demande de rencontre avec <strong>{form.target === "DGF" ? "la Direction Générale des Financements" : form.target === "Ministre" ? "le Ministre du Budget" : "le Ministre et la DGF"}</strong> dans le cadre des Spring Meetings 2026.</p>
            <p style={{ margin: "0 0 8px" }}><strong>Sujet :</strong> {form.topic}<br/><strong>Préférences :</strong> {prefLabels.join(" / ") || "—"}</p>
            <p style={{ margin: "0 0 8px" }}>L'agenda définitif sera communiqué environ 3 semaines avant les assemblées. Vous recevrez une notification dès qu'un créneau vous sera attribué.</p>

                {[["Institution", form.partner], ["Contact", `${form.contact} (${form.email})`], ["Interlocuteur", form.target], ["Sujet", form.topic], ["Préférences", prefLabels.join(" / ") || "—"]].map(([k, v]) => (
                  <tr key={k}><td style={{ padding: "3px 12px 3px 0", color: M, fontWeight: 600, whiteSpace: "nowrap" }}>{k}</td><td style={{ padding: "3px 0" }}>{v}</td></tr>

      <div style={{ textAlign: "center" }}>
        <button onClick={() => { setDone(false); setForm(f => ({ ...f, topic: "", details: "" })); setPrefs([{ day: "", period: "" }, { day: "", period: "" }, { day: "", period: "" }]); }} style={{ padding: "10px 28px", background: O, color: "#fff", border: "none", borderRadius: 8, fontWeight: 700, fontSize: 14, cursor: "pointer" }}>Nouvelle demande</button>
      </div>
    </div>

  return (
    <div>
      <STitle sub="Soumettez une demande de rencontre bilatérale avec la délégation ivoirienne">Demande de rencontre</STitle>
      <Card>
        <BlockTitle>Informations du partenaire</BlockTitle>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 16, marginBottom: 28 }}>
          <InputField label="Institution" req half value={form.partner} onChange={e => s("partner", e.target.value)} error={errors.partner} />
          <InputField label="Service / Département" half value={form.org} onChange={e => s("org", e.target.value)} />
          <InputField label="Nom du contact" req half value={form.contact} onChange={e => s("contact", e.target.value)} error={errors.contact} />
          <InputField label="E-mail" req half type="email" value={form.email} onChange={e => s("email", e.target.value)} error={errors.email} />
          <InputField label="Téléphone" half type="tel" value={form.phone} onChange={e => s("phone", e.target.value)} />
          <InputField label="Interlocuteur souhaité" req half>
            <select value={form.target} onChange={e => s("target", e.target.value)} style={{ width: "100%", padding: "10px 12px", border: `1px solid ${BD}`, borderRadius: 8, fontSize: 14, background: BG, fontFamily: "inherit", cursor: "pointer" }}>
              <option value="DGF">Direction Générale des Financements</option>
              <option value="Ministre">Ministre du Budget</option>
              <option value="Ministre + DGF">Ministre + DGF</option>
            </select>

        </div>

        <BlockTitle>Objet de la rencontre</BlockTitle>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 16, marginBottom: 28 }}>
          <InputField label="Sujet principal" req value={form.topic} onChange={e => s("topic", e.target.value)} error={errors.topic} />
          <InputField label="Détails / Points à aborder">
            <textarea value={form.details} onChange={e => s("details", e.target.value)} rows={3} style={{ width: "100%", padding: "10px 12px", border: `1px solid ${BD}`, borderRadius: 8, fontSize: 14, background: BG, fontFamily: "inherit", resize: "vertical", boxSizing: "border-box" }} />
          </InputField>
        </div>

        <BlockTitle>Préférences de créneaux</BlockTitle>
        <div style={{ padding: "12px 16px", background: BG, borderRadius: 8, marginBottom: 16, fontSize: 12, color: M, lineHeight: 1.6 }}>
          Les assemblées se tiennent du <strong style={{ color: D }}>lundi 13 au vendredi 17 avril 2026</strong>. Sélectionnez vos préférences par ordre de priorité. L'agenda définitif sera confirmé ~3 semaines avant.
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 28 }}>
          {prefs.map((p, i) => (
            <PrefSelector key={i} index={i + 1} pref={p} onChange={np => { const n = [...prefs]; n[i] = np; setPrefs(n); setErrors(e => ({ ...e, pref1: undefined })); }} error={i === 0 && errors.pref1} />
          ))}
          {errors.pref1 && <div style={{ fontSize: 11, color: "#DC2626", fontWeight: 600 }}>{errors.pref1}</div>}
        </div>

        <div style={{ display: "flex", justifyContent: "flex-end" }}>
          <button onClick={handleSubmit} style={{ padding: "12px 40px", background: O, color: "#fff", border: "none", borderRadius: 8, fontWeight: 700, fontSize: 14, cursor: "pointer", boxShadow: "0 2px 12px rgba(236,141,8,0.3)" }}>Soumettre la demande</button>
        </div>
      </Card>
    </div>
  );
}

          <tbody>{meetings.map(m => {

// ─── ADMIN: PLANNING BOARD (DUAL TRACK) ───

function PlanningBoard({ meetings, setMeetings }) {
  const [placing, setPlacing] = useState(null);
  const [trackView, setTrackView] = useState("all"); // all | dgf | ministre
  const unplaced = meetings.filter(m => !m.slot && m.status !== "declined");
  const placed = meetings.filter(m => m.slot);

  const getSlotMeeting = (dayKey, hour) => placed.find(m => m.slot === `${dayKey}|${hour}`);

  const assignSlot = (dayKey, hour) => {
    if (!placing) return;
    setMeetings(prev => prev.map(m => m.id === placing.id ? { ...m, slot: `${dayKey}|${hour}`, status: "confirmed" } : m));
    setPlacing(null);
  };

  const unassign = (id) => {
    setMeetings(prev => prev.map(m => m.id === id ? { ...m, slot: null, status: "pending" } : m));
  };

  // Filter placed meetings by track
  const isVisible = (m) => {
    if (trackView === "all") return true;
    if (trackView === "dgf") return m.target === "DGF";
    return m.target.includes("Ministre");
  };

  return (
    <div>
      <STitle sub="Cliquez sur une demande puis sur un créneau libre pour l'affecter">Planning interactif</STitle>

      {/* TRACK FILTER */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        {[["all", "Tous"], ["dgf", "DGF uniquement"], ["ministre", "Ministre"]].map(([k, l]) => (
          <button key={k} onClick={() => setTrackView(k)} style={{
            padding: "7px 16px", borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: "pointer", transition: "all 0.15s",
            border: `1px solid ${trackView === k ? O : BD}`,
            background: trackView === k ? LO : W,
            color: trackView === k ? O : M,
          }}>{l}</button>
        ))}
      </div>

      {/* UNPLACED */}
      <Card style={{ marginBottom: 20, padding: 16 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: D, marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ background: unplaced.length > 0 ? "#DC2626" : G, color: "#fff", fontSize: 10, fontWeight: 800, padding: "1px 7px", borderRadius: 10 }}>{unplaced.length}</span>
          Demandes à placer
          {placing && <span style={{ marginLeft: "auto", fontSize: 11, color: O, fontWeight: 600, background: LO, padding: "4px 12px", borderRadius: 6 }}>📍 Placez « {placing.partner} » — cliquez sur un créneau vert</span>}
        </div>
        {unplaced.length > 0 ? (
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {unplaced.map(m => (
              <div key={m.id} onClick={() => setPlacing(placing?.id === m.id ? null : m)}
                style={{
                  padding: "8px 12px", borderRadius: 8, cursor: "pointer", transition: "all 0.15s", maxWidth: 240,
                  border: `2px solid ${placing?.id === m.id ? O : BD}`,
                  background: placing?.id === m.id ? LO : W,
                  boxShadow: placing?.id === m.id ? `0 0 0 3px ${O}33` : "none",
                }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}>
                  <PriorityDot p={m.priority} />
                  <span style={{ fontSize: 12, fontWeight: 700, color: D }}>{m.partner}</span>
                </div>
                <TargetBadge target={m.target} />
                <div style={{ fontSize: 10, color: M, marginTop: 4 }}>Préf : {m.prefs?.map(p => prefLabel(p)).join(" / ")}</div>
                {m.note && <div style={{ fontSize: 10, color: PU, marginTop: 3, fontStyle: "italic" }}>📝 {m.note}</div>}
              </div>
            ))}
          </div>
        ) : (
          <div style={{ textAlign: "center", padding: 12, color: G, fontSize: 13, fontWeight: 600 }}>✅ Toutes les demandes sont placées</div>
        )}
      </Card>

      {/* LEGEND */}
      <div style={{ display: "flex", gap: 16, marginBottom: 12, fontSize: 11, color: M, flexWrap: "wrap" }}>
        <span><span style={{ display: "inline-block", width: 12, height: 12, borderRadius: 3, background: LO, border: `1px solid ${O}`, marginRight: 4, verticalAlign: "middle" }} />DGF</span>
        <span><span style={{ display: "inline-block", width: 12, height: 12, borderRadius: 3, background: LPU, border: `1px solid ${PU}`, marginRight: 4, verticalAlign: "middle" }} />Ministre (+DGF)</span>
        {placing && <span><span style={{ display: "inline-block", width: 12, height: 12, borderRadius: 3, background: "#DCFCE7", border: `2px dashed ${G}`, marginRight: 4, verticalAlign: "middle" }} />Correspond aux préférences</span>}
      </div>

      {/* GRID */}
      <div style={{ overflowX: "auto" }}>
        <div style={{ display: "grid", gridTemplateColumns: "56px repeat(5, 1fr)", gap: 0, minWidth: 750 }}>
          <div style={{ padding: 6, borderBottom: `2px solid ${O}` }} />
          {DAYS.map(d => (
            <div key={d.key} style={{ padding: "10px 4px", textAlign: "center", fontWeight: 700, fontSize: 11, color: D, background: BG, borderBottom: `2px solid ${O}`, borderRight: `1px solid ${BD}` }}>
              {d.label}
            </div>
          ))}

          {HOURS.map(hour => (
            <>
              <div key={`h-${hour}`} style={{ padding: "6px 4px", fontSize: 12, fontWeight: 800, color: M, display: "flex", alignItems: "center", justifyContent: "center", borderBottom: `1px solid ${BD}`, fontVariantNumeric: "tabular-nums", background: hour === "14:00" ? "#f5f3ee" : "transparent" }}>
                {HOUR_LABELS[hour]}
              </div>
              {DAYS.map(day => {
                const existing = getSlotMeeting(day.key, hour);
                const visible = existing && isVisible(existing);
                const hidden = existing && !visible;
                const isTarget = placing && !existing;
                const isPref = placing && isTarget && matchesPref(placing, day.key, hour);

                return (
                  <div key={`${day.key}-${hour}`}
                    onClick={() => isTarget && assignSlot(day.key, hour)}
                    style={{
                      padding: 5, borderBottom: `1px solid ${BD}`, borderRight: `1px solid ${BD}`,
                      minHeight: 56, cursor: isTarget ? "pointer" : "default",
                      background: visible
                        ? (existing.target.includes("Ministre") ? LPU : LO)
                        : hidden ? "#f9f9f7"
                        : isPref ? "#DCFCE7"
                        : isTarget ? `${G}08`
                        : hour === "14:00" ? "#fdfcfa" : W,
                      transition: "all 0.15s",
                      ...(isPref ? { outline: `2px dashed ${G}`, outlineOffset: -2 } : {}),
                      ...(isTarget && !isPref ? { outline: `1px dashed ${BD}`, outlineOffset: -1 } : {}),
                    }}>
                    {visible ? (
                      <div style={{ position: "relative" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 3, marginBottom: 2 }}>
                          <PriorityDot p={existing.priority} />
                          <span style={{ fontSize: 11, fontWeight: 700, color: D, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{existing.partner}</span>
                        </div>
                        <div style={{ fontSize: 9, color: M, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginBottom: 2 }}>{existing.topic}</div>
                        <TargetBadge target={existing.target} />
                        <button onClick={(e) => { e.stopPropagation(); unassign(existing.id); }}
                          style={{ position: "absolute", top: -4, right: -4, width: 18, height: 18, borderRadius: "50%", border: "1px solid #FECACA", background: "#FEE2E2", color: "#991B1B", fontSize: 10, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, padding: 0, lineHeight: 1 }}>×</button>
                      </div>
                    ) : hidden ? (
                      <div style={{ height: "100%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: M, opacity: 0.5 }}>Occupé</div>
                    ) : isTarget ? (
                      <div style={{ height: "100%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: isPref ? G : M, fontWeight: isPref ? 700 : 400 }}>
                        {isPref ? "★ Préféré" : "+ Placer"}
                      </div>
                    ) : null}
                  </div>
                );
              })}
            </>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── ADMIN: MANAGE LIST ───

function AdminManage({ meetings, setMeetings }) {
  const [filter, setFilter] = useState("all");
  const filtered = filter === "all" ? meetings : meetings.filter(m => m.status === filter);
  const update = (id, s) => setMeetings(prev => prev.map(m => m.id === id ? { ...m, status: s, ...(s === "declined" ? { slot: null } : {}) } : m));
  const setNote = (id, note) => setMeetings(prev => prev.map(m => m.id === id ? { ...m, note } : m));

  return (
    <div>
      <STitle sub="Gérer individuellement chaque demande">Gestion des demandes</STitle>
      <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
        {[["all", "Toutes"], ["pending", "En attente"], ["confirmed", "Confirmées"], ["declined", "Déclinées"]].map(([k, l]) => (
          <button key={k} onClick={() => setFilter(k)} style={{ padding: "8px 16px", border: `1px solid ${filter === k ? G : BD}`, borderRadius: 8, background: filter === k ? LG : W, color: filter === k ? G : M, fontWeight: 600, fontSize: 12, cursor: "pointer" }}>
            {l} ({k === "all" ? meetings.length : meetings.filter(m => m.status === k).length})
          </button>
        ))}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {filtered.map(m => {
          const slotLabel = m.slot ? (() => { const [d, t] = m.slot.split("|"); const day = DAYS.find(x => x.key === d); return `${day?.full || d} à ${t}`; })() : null;
          return (
            <Card key={m.id} style={{ padding: 18 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                    <PriorityDot p={m.priority} />
                    <span style={{ fontSize: 15, fontWeight: 700, color: D }}>{m.partner}</span>
                    <span style={{ fontSize: 12, color: M }}>— {m.org}</span>
                    <TargetBadge target={m.target} />
                  </div>
                  <div style={{ fontSize: 13, color: D, marginBottom: 4 }}>{m.topic}</div>
                  <div style={{ fontSize: 12, color: M }}>{m.contact} · {m.email}</div>
                  <div style={{ fontSize: 12, color: M }}>Préférences : {m.prefs?.map(p => prefLabel(p)).join(" / ")}</div>
                  {slotLabel && <div style={{ fontSize: 12, color: G, fontWeight: 700, marginTop: 4 }}>📍 Créneau : {slotLabel}</div>}
                </div>
                <StatusBadge status={m.status} />
              </div>

              {/* NOTES */}
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: M, marginBottom: 4, textTransform: "uppercase", letterSpacing: 0.5 }}>Note interne</div>
                <input value={m.note || ""} onChange={e => setNote(m.id, e.target.value)} placeholder="Ajouter une note (visible admin uniquement)…"
                  style={{ width: "100%", padding: "8px 10px", border: `1px solid ${BD}`, borderRadius: 6, fontSize: 12, background: BG, fontFamily: "inherit", boxSizing: "border-box", color: PU, fontStyle: m.note ? "normal" : "italic" }} />
              </div>

              <div style={{ display: "flex", gap: 8, borderTop: `1px solid ${BD}`, paddingTop: 12 }}>
                {m.status !== "confirmed" && <button onClick={() => update(m.id, "confirmed")} style={{ padding: "7px 18px", background: G, color: "#fff", border: "none", borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Confirmer</button>}
                {m.status !== "declined" && <button onClick={() => update(m.id, "declined")} style={{ padding: "7px 18px", background: "#fff", color: "#991B1B", border: "1px solid #FECACA", borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Décliner</button>}
                {m.status !== "pending" && <button onClick={() => update(m.id, "pending")} style={{ padding: "7px 18px", background: "#fff", color: M, border: `1px solid ${BD}`, borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>En attente</button>}
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

// ─── MAIN ───

function App() {
  const [user, setUser] = useState(null);
  const [view, setView] = useState(null);
  const [meetings, setMeetings] = useState(INIT_MEETINGS);

  const login = (u) => { setUser(u); setView(u.role === "admin" ? "dashboard" : "request"); };
  const logout = () => { setUser(null); setView(null); };

  if (!user) return <LoginScreen onLogin={login} />;

  const isAdmin = user.role === "admin";
  const pe = meetings.filter(m => m.status === "pending").length;
  const unplaced = meetings.filter(m => !m.slot && m.status !== "declined").length;

  const nav = isAdmin
    ? [{ id: "dashboard", icon: "📊", label: "Tableau de bord" }, { id: "planning", icon: "🗓️", label: "Planning", badge: unplaced }, { id: "manage", icon: "📋", label: "Demandes", badge: pe }]
    : [{ id: "request", icon: "📝", label: "Nouvelle demande" }, { id: "mystatus", icon: "🔍", label: "Mes demandes" }];

  return (
    <div style={{ fontFamily: "'Montserrat', 'Segoe UI', sans-serif", background: BG, minHeight: "100vh", display: "flex", color: D }}>
      <aside style={{ width: 240, background: W, borderRight: `1px solid ${BD}`, display: "flex", flexDirection: "column", position: "sticky", top: 0, height: "100vh", flexShrink: 0 }}>
        <div style={{ padding: "22px 20px 18px", borderBottom: `1px solid ${BD}` }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
            <div style={{ width: 36, height: 36, borderRadius: 8, flexShrink: 0, background: `linear-gradient(135deg, ${O}, ${G})`, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 900, fontSize: 13 }}>DGF</div>
            <div><div style={{ fontSize: 13, fontWeight: 800, color: D }}>Portail Meetings</div><div style={{ fontSize: 10, fontWeight: 600, color: G, letterSpacing: 0.5 }}>CÔTE D'IVOIRE</div></div>
          </div>
          <div style={{ fontSize: 10, color: M, padding: "6px 10px", background: BG, borderRadius: 6, textAlign: "center", fontWeight: 600 }}>Spring Meetings 2026</div>
        </div>

        <div style={{ margin: "14px 12px 6px", padding: "10px 14px", borderRadius: 8, background: isAdmin ? LG : LO, border: `1px solid ${isAdmin ? "#A7D5B8" : "#F5D89A"}` }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: isAdmin ? G : O, textTransform: "uppercase", letterSpacing: 0.6, marginBottom: 3 }}>{isAdmin ? "Espace Administration" : "Espace Partenaire"}</div>
          <div style={{ fontSize: 12, fontWeight: 600, color: D, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{user.name}</div>
        </div>

        <nav style={{ padding: "10px 12px", flex: 1, display: "flex", flexDirection: "column", gap: 2 }}>
          {nav.map(v => <NavItem key={v.id} icon={v.icon} label={v.label} active={view === v.id} onClick={() => setView(v.id)} badge={v.badge} />)}
        </nav>

        <div style={{ padding: "16px 12px", borderTop: `1px solid ${BD}` }}>
          <div onClick={logout} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 16px", borderRadius: 8, cursor: "pointer", color: M, fontSize: 13, fontWeight: 600 }}>
            <span>🚪</span> Déconnexion
          </div>
          <div style={{ marginTop: 10, fontSize: 9, color: M, textAlign: "center" }}>Cellule Intelligence Artificielle-DGF</div>
        </div>
      </aside>

      <main style={{ flex: 1, padding: 32, maxWidth: 960, overflow: "auto" }}>
        {isAdmin && view === "dashboard" && <AdminDash meetings={meetings} />}
        {isAdmin && view === "planning" && <PlanningBoard meetings={meetings} setMeetings={setMeetings} />}
        {isAdmin && view === "manage" && <AdminManage meetings={meetings} setMeetings={setMeetings} />}
        {!isAdmin && view === "request" && <PartnerForm user={user} />}
        {!isAdmin && view === "mystatus" && <PartnerStatus user={user} meetings={meetings} />}
      </main>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
